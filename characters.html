
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Cards - Sweet Notepad</title>
    
    <!-- 引入优雅的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,900;1,500&family=Nunito:wght@400;600;800;900&family=Satisfy&display=swap" rel="stylesheet">
    
    <!-- 中文可爱字体 -->
    <style>
        @import url("https://fontsapi.zeoseven.com/850/main/result.css");
        @import url("https://fontsapi.zeoseven.com/802/main/result.css");
    </style>
    
    <style>
        :root {
            --color-bg: #FAD8DF;
            --color-paper: #FFFFFF;
            --color-accent: #F29D80;
            --color-text-dark: #333333;
            --color-text-gray: #888888;
            --color-cream: #FFF3E8;
            
            --font-title: 'Playfair Display', serif;
            --font-body: 'Nunito', sans-serif;
            --font-hand: 'Satisfy', cursive;
            --font-cute-cn: 'KeinannMaruPOP', sans-serif;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            user-select: none; 
        }

        body {
            background-color: var(--color-bg);
            background-image: radial-gradient(circle at 50% 50%, var(--color-cream) 0%, transparent 80%);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            font-family: var(--font-body); 
            color: var(--color-text-dark);
            overflow: hidden;
        }

        /* ================= 1. 记事本主容器 ================= */
        .notepad-wrapper {
            position: relative;
            width: 900px; 
            height: 820px;
            margin-top: 20px;
        }

        .notepad {
            width: 100%; 
            height: 100%;
            background: var(--color-paper);
            border-radius: 12px 12px 20px 20px;
            box-shadow: 
                0 30px 60px rgba(242, 157, 128, 0.2),
                inset 0 0 50px rgba(0,0,0,0.02);
            position: relative; 
            z-index: 10;
            display: flex; 
            flex-direction: column;
            padding: 50px 60px 40px 60px;
        }

        /* ================= 2. 顶部线圈装订 (Spiral Binding) ================= */
        .spirals-container {
            position: absolute; 
            top: -15px; 
            left: 0; 
            width: 100%;
            display: flex; 
            justify-content: space-evenly; 
            padding: 0 40px;
            z-index: 20; 
            pointer-events: none;
        }

        .spiral {
            width: 12px; 
            height: 35px;
            background: linear-gradient(to right, #e0e0e0 0%, #ffffff 30%, #a3a3a3 100%);
            border-radius: 6px;
            box-shadow: 2px 5px 5px rgba(0,0,0,0.15), inset 0 1px 2px white;
            position: relative;
        }
        
        .spiral::after {
            content: ''; 
            position: absolute; 
            bottom: 4px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 14px; 
            height: 14px; 
            background: #222; 
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); 
            z-index: -1;
        }

        /* ================= 3. 右侧索引 Tabs ================= */
        .tabs {
            position: absolute; 
            right: -60px; 
            top: 60px;
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 5;
        }
        
        .tab {
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(5px);
            padding: 15px 12px; 
            writing-mode: vertical-rl;
            border-radius: 0 12px 12px 0; 
            font-weight: 800; 
            color: #db7681;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 2px 5px 15px rgba(0,0,0,0.05); 
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.8); 
            border-left: none;
        }
        
        .tab:hover { 
            background: rgba(255, 255, 255, 0.9); 
        }
        
        .tab.active {
            background: var(--color-paper); 
            color: var(--color-accent);
            transform: translateX(10px); 
            width: 60px; 
            padding-left: 15px;
            box-shadow: 5px 10px 20px rgba(242, 157, 128, 0.2); 
            border-color: transparent;
        }

        /* ================= 4. 内容排版与动画 ================= */
        .content-area {
            flex: 1; 
            display: flex; 
            flex-direction: column;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        .content-area.fade-out { 
            opacity: 0; 
            transform: translateY(15px); 
        }

        /* 头部：名字与标签 */
        .header-area { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-bottom: 30px; 
            border-bottom: 2px solid var(--color-accent); 
            padding-bottom: 15px; 
        }
        
        .char-name { 
            font-family: var(--font-title); 
            font-size: 4.5rem; 
            line-height: 0.9; 
            color: var(--color-text-dark); 
            letter-spacing: -1px; 
        }
        
        .char-meta { 
            text-align: right; 
        }
        
        .char-group { 
            font-size: 0.8rem; 
            font-weight: 900; 
            color: var(--color-accent); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
        }
        
        .char-date { 
            font-family: var(--font-title); 
            font-style: italic; 
            font-size: 1.2rem; 
            color: var(--color-text-gray); 
        }

        /* 中部：照片 + 任务分栏 */
        .split-area { 
            display: flex; 
            gap: 40px; 
            margin-bottom: 30px; 
        }
        
        .avatar-box {
            width: 280px; 
            height: 350px; 
            background: var(--color-cream);
            border-radius: 12px; 
            overflow: hidden; 
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08); 
            flex-shrink: 0;
            border: 8px solid white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .avatar-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(242, 157, 128, 0.2);
        }
        
        .avatar-box::after {
            content: '点击查看详情 >';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            font-family: var(--font-cute-cn);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .avatar-box:hover::after {
            opacity: 1;
        }
        
        .avatar-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        /* 照片胶带装饰 */
        .tape { 
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%) rotate(-3deg); 
            width: 80px; 
            height: 25px; 
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(2px); 
            z-index: 10; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            border: 1px solid rgba(255,255,255,0.4);
        }

        .info-box { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .section-title { 
            font-family: var(--font-title); 
            font-size: 1.8rem; 
            color: var(--color-text-dark); 
            margin-bottom: 10px; 
        }
        
        /* 任务列表 */
        .task-list { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .task-item { 
            display: flex; 
            gap: 12px; 
            align-items: flex-start; 
        }
        
        .task-circle { 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            border: 2px solid #ccc; 
            flex-shrink: 0; 
            margin-top: 2px; 
            position: relative; 
            transition: 0.2s; 
        }
        
        .task-item.checked .task-circle { 
            border-color: var(--color-accent); 
            background: rgba(242, 157, 128, 0.1); 
        }
        
        .task-item.checked .task-circle::after { 
            content: '✔'; 
            position: absolute; 
            top: -2px; 
            left: 4px; 
            color: var(--color-accent); 
            font-size: 14px; 
            font-weight: 900;
        }
        
        .task-text { 
            font-size: 1rem; 
            color: var(--color-text-dark); 
            line-height: 1.5; 
            font-weight: 600; 
        }
        
        .task-item.checked .task-text { 
            color: #aaa; 
            text-decoration: line-through; 
            text-decoration-thickness: 2px; 
            text-decoration-color: var(--color-bg); 
        }

        /* 底部：日记本区域 */
        .journal-area {
            flex: 1; 
            position: relative; 
            padding-top: 15px;
            background-image: repeating-linear-gradient(transparent, transparent 34px, rgba(0,0,0,0.06) 34px, rgba(0,0,0,0.06) 35px);
        }
        
        .journal-text {
            font-family: var(--font-hand); 
            font-size: 1.8rem; 
            color: #555;
            line-height: 35px;
            padding-top: 2px;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .notepad-wrapper {
                width: 90vw;
                height: 85vh;
            }
            
            .notepad {
                padding: 40px 40px 30px 40px;
            }
            
            .char-name {
                font-size: 3.5rem;
            }
            
            .tabs {
                right: -50px;
            }
        }

        @media (max-width: 768px) {
            .notepad-wrapper {
                width: 95vw;
                height: 90vh;
            }
            
            .notepad {
                padding: 30px 25px;
            }
            
            .char-name {
                font-size: 2.5rem;
            }
            
            .split-area {
                flex-direction: column;
                gap: 25px;
            }
            
            .avatar-box {
                width: 100%;
                height: 300px;
            }
            
            .tabs {
                display: none;
            }
        }

    </style>
</head>
<body>

    <div class="notepad-wrapper">
        
        <!-- 顶部金属线圈 -->
        <div class="spirals-container">
            <script>for(let i=0; i<18; i++) document.write('<div class="spiral"></div>');</script>
        </div>

        <!-- 侧边切换标签 -->
        <div class="tabs" id="tabs-container"></div>

        <!-- 记事本主纸张 -->
        <div class="notepad">
            <div class="content-area" id="content-area"></div>
        </div>

    </div>

    <script src="characters-data.js"></script>
    
    <script>
        const contentArea = document.getElementById('content-area');
        const tabsContainer = document.getElementById('tabs-container');
        let currentIndex = 0;

        /* ================= 渲染 Tabs ================= */
        function initTabs() {
            charactersData.forEach((char, index) => {
                const tab = document.createElement('div');
                tab.className = `tab ${index === 0 ? 'active' : ''}`;
                tab.innerText = `CHAR ${char.no}`;
                tab.onclick = () => switchCharacter(index);
                tabsContainer.appendChild(tab);
            });
        }

        /* ================= 渲染页面内容 ================= */
        function renderContent(index) {
            const char = charactersData[index];
            
            // 生成任务列表 HTML
            const tasksHTML = char.tasks.map(task => `
                <div class="task-item ${task.checked ? 'checked' : ''}">
                    <div class="task-circle"></div>
                    <div class="task-text">${task.text}</div>
                </div>
            `).join('');

            // 处理日记换行
            const journalFormatted = char.journal.replace(/\n/g, '<br>');

            contentArea.innerHTML = `
                <div class="header-area">
                    <h1 class="char-name">${char.name}</h1>
                    <div class="char-meta">
                        <div class="char-group">CLASS: ${char.group}</div>
                        <div class="char-date">${char.date}</div>
                    </div>
                </div>

                <div class="split-area">
                    <div class="avatar-box" onclick="goToDetail('${char.id}')">
                        <div class="tape"></div>
                        <img src="${char.avatar}" alt="${char.name}">
                    </div>
                    
                    <div class="info-box">
                        <h2 class="section-title">Priorities</h2>
                        <div class="task-list">
                            ${tasksHTML}
                        </div>
                    </div>
                </div>

                <div class="journal-area">
                    <h2 class="section-title" style="margin-bottom:5px;">Journal & Notes</h2>
                    <div class="journal-text">${journalFormatted}</div>
                </div>
            `;
        }

        /* ================= 切换逻辑与动效 ================= */
        let isAnimating = false;

        function switchCharacter(index) {
            if (isAnimating || index === currentIndex) return;
            isAnimating = true;

            // 1. 更新 Tab 状态
            const tabs = document.querySelectorAll('.tab');
            tabs[currentIndex].classList.remove('active');
            tabs[index].classList.add('active');
            
            currentIndex = index;

            // 2. 内容淡出
            contentArea.classList.add('fade-out');

            // 3. 等待淡出结束后，更新内容并淡入
            setTimeout(() => {
                renderContent(index);
                contentArea.classList.remove('fade-out');
                
                // 动画冷却
                setTimeout(() => { isAnimating = false; }, 400);
            }, 300);
        }

        /* ================= 跳转到角色详情页 ================= */
        function goToDetail(charId) {
            window.location.href = `character-detail.html?id=${charId}`;
        }

        // 初始化
        window.onload = () => {
            initTabs();
            renderContent(0);
        };

    </script>

    <!-- 全局导航组件 -->
    <script src="nav-component.js"></script>

</body>
</html>
