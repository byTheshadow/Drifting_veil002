<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Cards - Sweet Binder</title>
    
    <!-- 字体引入 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,500&family=Nunito:wght@400;600;700;800&family=Dancing+Script:wght@400;700&family=Satisfy&display=swap" rel="stylesheet">
    
    <!-- 中文可爱字体 -->
    <style>
        @import url("https://fontsapi.zeoseven.com/850/main/result.css");
        @import url("https://fontsapi.zeoseven.com/802/main/result.css");
        @import url("https://fontsapi.zeoseven.com/282/main/result.css");
    </style>
    
    <style>
        :root {
            --bg-desktop: #FFF3E8;
            --book-white: #FFFFFF;
            --accent-pink: #FAD8DF;
            --accent-coral: #F29D80;
            --text-dark: #333333;
            --text-gray: #888888;
            --font-title: 'Playfair Display', serif;
            --font-body: 'Nunito', sans-serif;
            --font-handwrite: 'Dancing Script', cursive;
            --font-cute-cn: 'KeinannMaruPOP', sans-serif;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            user-select: none; 
        }

        body {
            background-color: var(--bg-desktop);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            font-family: var(--font-body); 
            color: var(--text-dark);
            overflow: hidden;
            position: relative;
        }

        /* 返回按钮 */
        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 200;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(242, 157, 128, 0.2);
            transition: all 0.3s;
            font-size: 1.5rem;
            color: var(--accent-coral);
        }

        .back-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(242, 157, 128, 0.4);
        }

        /* 活页本场景 */
        .scene {
            width: 1100px; 
            height: 750px;
            perspective: 2500px;
            position: relative;
        }

        .book {
            width: 100%; 
            height: 100%; 
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        /* 静态页底层 */
        .static-page {
            position: absolute; 
            top: 0; 
            width: 50%; 
            height: 100%;
            background: var(--book-white); 
            padding: 50px 60px;
            display: flex; 
            flex-direction: column;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.02);
            overflow: hidden;
        }
        
        .static-left { 
            left: 0; 
            border-radius: 12px 0 0 12px; 
            border-right: 1px solid rgba(0,0,0,0.05); 
        }
        
        .static-right { 
            right: 0; 
            border-radius: 0 12px 12px 0; 
            border-left: 1px solid rgba(0,0,0,0.05); 
        }

        /* 3D翻页纸张 */
        .flipper {
            position: absolute; 
            top: 0; 
            left: 50%; 
            width: 50%; 
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            z-index: 20;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            pointer-events: none;
        }
        
        .flipper.is-flipped {
            transform: rotateY(-180deg);
        }

        .flip-face {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: var(--book-white); 
            padding: 50px 60px;
            backface-visibility: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.02);
            overflow: hidden;
        }
        
        .flip-front {
            border-radius: 0 12px 12px 0;
            z-index: 2;
        }
        
        .flip-back {
            transform: rotateY(180deg);
            border-radius: 12px 0 0 12px;
            z-index: 1;
        }

        /* 铁环装订 */
        .binder-spine {
            position: absolute; 
            top: 0; 
            left: 50%; 
            width: 40px; 
            height: 100%;
            transform: translateX(-50%); 
            z-index: 100; 
            pointer-events: none;
            display: flex; 
            flex-direction: column; 
            justify-content: space-evenly; 
            align-items: center;
        }
        
        .ring {
            width: 55px; 
            height: 16px;
            background: linear-gradient(to bottom, #f2f2f2 0%, #d4d4d4 30%, #e0e0e0 70%, #a3a3a3 100%);
            border-radius: 8px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        /* 右侧标签索引 */
        .tabs { 
            position: absolute; 
            right: -55px; 
            top: 50px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            z-index: 5; 
        }
        
        .tab {
            background: var(--accent-pink); 
            padding: 15px 10px; 
            writing-mode: vertical-rl;
            border-radius: 0 8px 8px 0; 
            font-weight: 700; 
            color: #db7681;
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
            font-family: var(--font-cute-cn);
        }
        
        .tab.active { 
            background: var(--book-white); 
            color: var(--accent-coral); 
            transform: translateX(10px); 
        }

        /* 点击区域 */
        .click-zone { 
            position: absolute; 
            top: 0; 
            width: 50%; 
            height: 100%; 
            cursor: pointer; 
            z-index: 10; 
        }
        
        .click-left { left: 0; }
        .click-right { right: 0; }

        /* 角色卡片内容样式 */
        .char-header { 
            display: flex; 
            justify-content: space-between; 
            border-top: 2px solid var(--accent-coral); 
            padding-top: 10px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            font-weight: 800; 
            color: var(--accent-coral); 
            letter-spacing: 2px; 
        }
        
        .char-name { 
            font-family: var(--font-handwrite); 
            font-size: 3.5rem; 
            line-height: 1.1; 
            margin-bottom: 5px;
            color: var(--text-dark);
        }
        
        .char-name-en {
            font-family: var(--font-title);
            font-style: italic;
            font-size: 1.8rem;
            color: var(--text-gray);
            margin-bottom: 10px;
        }
        
        .char-date { 
            font-family: var(--font-title); 
            font-style: italic; 
            font-size: 1.2rem; 
            color: var(--text-gray); 
            margin-bottom: 30px; 
        }
        
        .content-split { 
            display: flex; 
            gap: 30px; 
            flex: 1; 
        }
        
        .col-left { flex: 1; }
        
        .col-right { 
            flex: 1.3; 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
        }
        
        .avatar-box { 
            width: 100%; 
            aspect-ratio: 3/4; 
            background: var(--accent-pink); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(242, 157, 128, 0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .avatar-box::after {
            content: '点击查看详情 >';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            font-family: var(--font-cute-cn);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .avatar-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(242, 157, 128, 0.3);
        }
        
        .avatar-box:hover::after {
            opacity: 1;
        }
        
        .avatar-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .section-title { 
            font-family: var(--font-handwrite); 
            font-size: 1.8rem; 
            margin-bottom: 15px;
            color: var(--accent-coral);
        }
        
        .tags-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .tag {
            background: var(--accent-pink);
            color: var(--accent-coral);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font-cute-cn);
        }
        
        .task-item { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 12px; 
            align-items: flex-start; 
        }
        
        .task-circle { 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            border: 2px solid #ccc; 
            flex-shrink: 0; 
            margin-top: 4px; 
            position: relative; 
        }
        
        .task-item.checked .task-circle { 
            border-color: var(--accent-coral); 
            background: rgba(242, 157, 128, 0.1); 
        }
        
        .task-item.checked .task-circle::after { 
            content: '✔'; 
            position: absolute; 
            top: -4px; 
            left: 2px; 
            color: var(--accent-coral); 
            font-size: 12px; 
        }
        
        .task-text { 
            font-size: 0.9rem; 
            line-height: 1.4; 
        }
        
        .task-item.checked .task-text { 
            color: #aaa; 
            text-decoration: line-through; 
        }
        
        .journal-box { 
            font-family: var(--font-handwrite); 
            color: var(--text-gray); 
            line-height: 1.8; 
            border-top: 1px dashed #eee; 
            padding-top: 15px;
            font-size: 1rem;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .scene {
                width: 90vw;
                height: 70vh;
            }
            
            .static-page, .flip-face {
                padding: 30px 40px;
            }
            
            .char-name {
                font-size: 2.5rem;
            }
            
            .tabs {
                right: -45px;
                gap: 10px;
            }
        }

        @media (max-width: 768px) {
            .scene {
                width: 95vw;
                height: 60vh;
            }
            
            .static-page, .flip-face {
                padding: 20px 25px;
            }
            
            .char-name {
                font-size: 2rem;
            }
            
            .content-split {
                flex-direction: column;
                gap: 20px;
            }
            
            .tabs {
                display: none;
            }
        }

    </style>
</head>
<body>

    <!-- 返回按钮 -->
    <div class="back-button" onclick="goBack()">←</div>

    <div class="scene">
        <div class="book">
            <!-- 铁环装订 -->
            <div class="binder-spine">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
            </div>

            <!-- 右侧标签 -->
            <div class="tabs" id="tabs-container"></div>

            <!-- 静态底层页面 -->
            <div class="static-page static-left" id="static-left"></div>
            <div class="static-page static-right" id="static-right"></div>

            <!-- 3D翻页层 -->
            <div class="flipper" id="flipper">
                <div class="flip-face flip-front" id="flip-front"></div>
                <div class="flip-face flip-back" id="flip-back"></div>
            </div>

            <!-- 点击区域 -->
            <div class="click-zone click-left" onclick="prev()"></div>
            <div class="click-zone click-right" onclick="next()"></div>
        </div>
    </div>

    <script src="characters-data.js"></script>
    
    <script>
        // 生成角色卡片HTML
        function getCharHTML(char) {
            return `
                <div class="char-header">
                    <span>CHAR ${char.no}</span>
                    <span>${char.group}</span>
                </div>
                <h1 class="char-name">${char.name}</h1>
                <div class="char-name-en">${char.nameEn}</div>
                <div class="char-date">${char.date}</div>
                <div class="content-split">
                    <div class="col-left">
                        <div class="avatar-box" onclick="goToDetail('${char.id}')">
                            <img src="${char.avatar}" alt="${char.name}">
                        </div>
                    </div>
                    <div class="col-right">
                        <div>
                            <h2 class="section-title">Tags</h2>
                            <div class="tags-container">
                                ${char.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                        <div>
                            <h2 class="section-title">To-Do List</h2>
                            ${char.tasks.map(t => `
                                <div class="task-item ${t.checked ? 'checked' : ''}">
                                    <div class="task-circle"></div>
                                    <div class="task-text">${t.text}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-top:auto">
                            <h2 class="section-title">Journal</h2>
                            <div class="journal-box">${char.journal}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        let currentPage = 0; // 当前页码 (0, 1, 2...)
        let isLocked = false; // 翻页锁
        const flipper = document.getElementById('flipper');
        const staticLeft = document.getElementById('static-left');
        const staticRight = document.getElementById('static-right');
        const flipFront = document.getElementById('flip-front');
        const flipBack = document.getElementById('flip-back');
        const totalPages = Math.ceil(charactersData.length / 2);

        // 初始化标签
        function initTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            for (let i = 0; i < totalPages; i++) {
                const tab = document.createElement('div');
                tab.className = 'tab' + (i === 0 ? ' active' : '');
                tab.textContent = `PAGE ${i + 1}`;
                tab.onclick = () => jumpTo(i);
                tabsContainer.appendChild(tab);
            }
        }

        // 更新标签状态
        function updateTabs() {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === currentPage);
            });
        }

        // 初始化页面
        function initPages() {
            staticLeft.innerHTML = getCharHTML(charactersData[0]);
            if (charactersData[1]) {
                staticRight.innerHTML = getCharHTML(charactersData[1]);
            }
        }

        // 下一页
        function next() {
            if (isLocked || currentPage >= totalPages - 1) return;
            isLocked = true;

            const currentLeftIdx = currentPage * 2;
            const currentRightIdx = currentPage * 2 + 1;
            const nextLeftIdx = (currentPage + 1) * 2;
            const nextRightIdx = (currentPage + 1) * 2 + 1;

            // 准备翻页纸：正面是当前右页，背面是下一页左页
            if (charactersData[currentRightIdx]) {
                flipFront.innerHTML = getCharHTML(charactersData[currentRightIdx]);
            }
            if (charactersData[nextLeftIdx]) {
                flipBack.innerHTML = getCharHTML(charactersData[nextLeftIdx]);
            }

            // 底层右侧立刻换成下一页右页
            if (charactersData[nextRightIdx]) {
                staticRight.innerHTML = getCharHTML(charactersData[nextRightIdx]);
            } else {
                staticRight.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ccc;font-size:1.5rem;">End ♡</div>';
            }

            // 开始翻页
            flipper.classList.add('is-flipped');

            setTimeout(() => {
                currentPage++;
                // 翻页结束，底层左侧换成刚才翻过去的背面内容
                if (charactersData[nextLeftIdx]) {
                    staticLeft.innerHTML = getCharHTML(charactersData[nextLeftIdx]);
                }
                
                // 瞬间重置翻页纸位置
                flipper.style.transition = 'none';
                flipper.classList.remove('is-flipped');
                
                setTimeout(() => { 
                    flipper.style.transition = 'transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1)';
                    isLocked = false;
                    updateTabs();
                }, 50);
            }, 800);
        }

        // 上一页
        function prev() {
            if (isLocked || currentPage <= 0) return;
            isLocked = true;

            const currentLeftIdx = currentPage * 2;
            const prevLeftIdx = (currentPage - 1) * 2;
            const prevRightIdx = (currentPage - 1) * 2 + 1;

            // 准备翻页纸：背面是当前左页，正面是上一页右页
            if (charactersData[currentLeftIdx]) {
                flipBack.innerHTML = getCharHTML(charactersData[currentLeftIdx]);
            }
            if (charactersData[prevRightIdx]) {
                flipFront.innerHTML = getCharHTML(charactersData[prevRightIdx]);
            }

            // 底层左侧立刻换成上一页左页
            if (charactersData[prevLeftIdx]) {
                staticLeft.innerHTML = getCharHTML(charactersData[prevLeftIdx]);
            }

            // 先把翻页纸瞬间放到左边状态，然后往右边翻回来
            flipper.style.transition = 'none';
            flipper.classList.add('is-flipped');
            
            setTimeout(() => {
                flipper.style.transition = 'transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1)';
                flipper.classList.remove('is-flipped');

                setTimeout(() => {
                    currentPage--;
                    if (charactersData[prevRightIdx]) {
                        staticRight.innerHTML = getCharHTML(charactersData[prevRightIdx]);
                    }
                    isLocked = false;
                    updateTabs();
                }, 800);
            }, 50);
        }

        // 跳转到指定页
        function jumpTo(pageIdx) {
            if (isLocked || pageIdx === currentPage || pageIdx < 0 || pageIdx >= totalPages) return;
            
            // 简单实现：连续翻页
            if (pageIdx > currentPage) {
                next();
                setTimeout(() => {
                    if (currentPage !== pageIdx && !isLocked) jumpTo(pageIdx);
                }, 900);
            } else {
                prev();
                setTimeout(() => {
                    if (currentPage !== pageIdx && !isLocked) jumpTo(pageIdx);
                }, 900);
            }
        }

        // 跳转到角色详情页
        function goToDetail(charId) {
            // 这里后续会跳转到详情页
            alert(`即将查看角色详情: ${charId}\n（详情页开发中...）`);
            // window.location.href = `character-detail.html?id=${charId}`;
        }

        // 返回主页
        function goBack() {
            window.location.href = 'index.html';
        }

        // 页面加载完成后初始化
        window.onload = () => {
            initTabs();
            initPages();
        };
    </script>
</body>
</html>
