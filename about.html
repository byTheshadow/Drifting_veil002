<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Sweet Journal</title>
    
    <!-- 字体引入 -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Londrina+Outline&family=Nunito:wght@400;600;700;800&family=Playball&family=Pacifico&family=Dancing+Script:wght@400;700&family=Satisfy&display=swap" rel="stylesheet">
    
    <!-- 中文可爱字体 -->
    <style>
        @import url("https://fontsapi.zeoseven.com/850/main/result.css");
        @import url("https://fontsapi.zeoseven.com/802/main/result.css");
        @import url("https://fontsapi.zeoseven.com/282/main/result.css");
    </style>
    
    <style>
        /* ================= 基础变量 ================= */
        :root {
            --color-bg-dark: #2a2425;
            --page-left-bg: #FFF3E8;
            --page-right-bg: #FAD8DF;
            --text-dark: #333333;
            --text-gray: #777777;
            --highlight-pink: #F29D80;
            --accent-color: #F29D80;
            
            --font-typewriter: 'Courier Prime', monospace;
            --font-handwriting: 'Caveat', cursive;
            --font-title: 'Londrina Outline', sans-serif;
            --font-cute-cn: 'KeinannMaruPOP', sans-serif;
            --font-elegant: 'Dancing Script', cursive;
            --font-playball: 'Playball', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--color-bg-dark);
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: var(--font-typewriter);
            color: var(--text-dark);
            padding: 20px;
        }

        /* ================= 返回按钮 ================= */
        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #FFFFFF;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(242, 157, 128, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: bold;
        }

        .back-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(242, 157, 128, 0.5);
        }

        /* ================= 手帐本主容器 ================= */
        .journal-spread {
            display: flex;
            width: 100%;
            max-width: 1300px;
            aspect-ratio: 16 / 10;
            background: #fff;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                inset 0 0 40px rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 书本中间的折痕阴影 */
        .journal-spread::after {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            width: 40px; height: 100%;
            transform: translateX(-50%);
            background: linear-gradient(to right, 
                rgba(0,0,0,0.0) 0%, 
                rgba(0,0,0,0.1) 40%, 
                rgba(0,0,0,0.15) 50%, 
                rgba(0,0,0,0.1) 60%, 
                rgba(0,0,0,0.0) 100%);
            pointer-events: none;
            z-index: 100;
        }

        /* 左右页基础设置 */
        .page {
            flex: 1;
            position: relative;
            padding: 5%;
            overflow: hidden;
        }

        /* ================= 左页：网格背景 ================= */
        .left-page {
            background-color: var(--page-left-bg);
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.06) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* ================= 右页：粉色背景 ================= */
        .right-page {
            background-color: var(--page-right-bg);
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
        }

        /* ================= 装饰元素 ================= */
        .deco {
            position: absolute;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
            z-index: 10;
            pointer-events: none;
        }
        
        .deco-bg { z-index: 1; }
        .deco-top { z-index: 50; }

        /* ================= 左页元素 ================= */
        .hollow-title {
            font-family: var(--font-title);
            font-size: 3.5rem;
            letter-spacing: 2px;
            color: transparent;
            -webkit-text-stroke: 1.5px var(--text-dark);
            position: absolute;
            opacity: 0.8;
        }
        
        .title-left { 
            top: 5%; 
            left: 5%; 
        }

        /* 头像照片 - 拍立得风格 */
        .avatar-photo {
            position: absolute;
            top: 20%;
            left: 8%;
            width: 40%;
            aspect-ratio: 1/1.15;
            background: #fff;
            padding: 10px 10px 35px 10px;
            box-shadow: 3px 8px 20px rgba(0,0,0,0.2);
            transform: rotate(-5deg);
            z-index: 20;
        }

        .avatar-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #e0e0e0;
        }

        .avatar-caption {
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: var(--font-handwriting);
            font-size: 1.2rem;
            color: var(--text-dark);
        }

        /* 基本信息文字块 */
        .info-text {
            position: absolute;
            top: 18%;
            right: 8%;
            width: 42%;
            font-size: 0.85rem;
            line-height: 1.8;
            z-index: 15;
        }

        .info-name {
            font-family: var(--font-playball);
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .info-title {
            font-family: var(--font-elegant);
            font-size: 1.3rem;
            color: var(--text-gray);
            margin-bottom: 15px;
        }

        /* 荧光笔高光标签 */
        .highlight-wrap {
            position: absolute;
            bottom: 18%;
            left: 10%;
            transform: rotate(-2deg);
            z-index: 20;
        }

        .highlight {
            background: var(--highlight-pink);
            padding: 3px 10px;
            margin: 5px 0;
            display: inline-block;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
            font-family: var(--font-cute-cn);
        }

        /* ================= 右页元素 ================= */
        .title-right {
            bottom: 5%;
            right: 5%;
        }

        /* 明信片样式的自我介绍 */
        .postcard {
            position: absolute;
            top: 10%;
            left: 8%;
            width: 75%;
            background: #fdfaf6;
            padding: 25px 20px 20px 20px;
            box-shadow: 1px 3px 10px rgba(0,0,0,0.1);
            transform: rotate(-1deg);
            z-index: 5;
            border-radius: 2px;
        }

        .postcard-title {
            font-family: var(--font-handwriting);
            font-size: 1.8rem;
            color: #db7681;
            text-align: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 8px;
        }

        .postcard-text {
            font-size: 0.85rem;
            line-height: 1.8;
            text-align: justify;
            font-family: var(--font-typewriter);
        }

        /* 技能标签 - 便签风格 */
        .skills-section {
            position: absolute;
            bottom: 25%;
            left: 10%;
            width: 80%;
            z-index: 15;
        }

        .skills-title {
            font-family: var(--font-handwriting);
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .skills-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.8);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dark);
            box-shadow: 1px 2px 5px rgba(0,0,0,0.1);
            border: 1px solid rgba(242, 157, 128, 0.3);
        }

        /* 社交链接 - 邮票风格 */
        .socials-section {
            position: absolute;
            bottom: 8%;
            left: 10%;
            display: flex;
            gap: 12px;
            z-index: 15;
        }

        .social-stamp {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1.5rem;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.15);
        }

        .social-stamp:hover {
            transform: rotate(5deg) scale(1.1);
            box-shadow: 3px 5px 12px rgba(242, 157, 128, 0.4);
        }

        /* 第二张照片 - 右侧 */
        .photo-2 {
            position: absolute;
            top: 15%;
            right: 8%;
            width: 35%;
            aspect-ratio: 1/1.2;
            background: #fff;
            padding: 8px 8px 30px 8px;
            box-shadow: 3px 8px 20px rgba(0,0,0,0.2);
            transform: rotate(8deg);
            z-index: 25;
        }

        .photo-2 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #e0e0e0;
        }

        /* ================= 响应式设计 ================= */
        @media (max-width: 768px) {
            .journal-spread {
                flex-direction: column;
                aspect-ratio: 9 / 16;
                max-width: 500px;
            }

            .hollow-title {
                font-size: 2.5rem;
            }

            .avatar-photo,
            .info-text,
            .postcard,
            .photo-2 {
                position: relative;
                width: 90%;
                margin: 15px auto;
                transform: rotate(0deg);
            }

            .highlight-wrap,
            .skills-section,
            .socials-section {
                position: relative;
                width: 90%;
                margin: 15px auto;
                transform: rotate(0deg);
            }
        }
    </style>
</head>
<body>

    <!-- 返回按钮 -->
    <a href="index.html" class="back-button">←</a>

    <div class="journal-spread">
        
        <!-- ================= 左页 ================= -->
        <div class="page left-page">
            
            <h1 class="hollow-title title-left">ABOUT+ME</h1>

            <!-- 头像照片 -->
            <div class="avatar-photo">
                <img id="avatarImg" src="" alt="Avatar">
                <div class="avatar-caption" id="avatarCaption">That's me! ♡</div>
            </div>

            <!-- 基本信息 -->
            <div class="info-text">
                <div class="info-name" id="infoName">Your Name</div>
                <div class="info-title" id="infoTitle">Your Title</div>
                <p id="infoShortBio" style="font-size: 0.8rem; line-height: 1.6;">
                    A short introduction about yourself...
                </p>
            </div>

            <!-- 荧光笔高光 -->
            <div class="highlight-wrap" id="highlightsContainer">
                <!-- 动态生成 -->
            </div>

            <!-- 装饰贴纸 (左页) -->
            <img class="deco deco-bg" src="https://tc-new.z.wiki/autoupload/1N2_UJVYUo2KjM-_22IFnCfNcKcqEnRmcljopnyJoMs/20260423/qNXm/1629X1451/2026-04-23_135023.png/webp" style="bottom: 5%; left: 5%; width: 20%; transform: rotate(-5deg);">
            <img class="deco deco-top" src="https://tc-new.z.wiki/autoupload/1N2_UJVYUo2KjM-_22IFnCfNcKcqEnRmcljopnyJoMs/20260423/ZDpA/1130X1125/2026-04-23_135927.png/webp" style="top: 15%; left: -2%; width: 12%;">
            <img class="deco" src="https://tc-new.z.wiki/autoupload/1N2_UJVYUo2KjM-_22IFnCfNcKcqEnRmcljopnyJoMs/20260423/Wptl/1132X1036/2026-04-23_135957.png/webp" style="bottom: 25%; left: 45%; width: 10%;">
            
        </div>

        <!-- ================= 右页 ================= -->
        <div class="page right-page">
            
            <!-- 明信片自我介绍 -->
            <div class="postcard">
                <div class="postcard-title">✧ About Me ✧</div>
                <div class="postcard-text" id="bioText">
                    Your detailed bio will appear here...
                </div>
            </div>

            <!-- 第二张照片 -->
            <div class="photo-2">
                <img id="photo2Img" src="" alt="Photo 2">
            </div>

            <!-- 技能标签 -->
            <div class="skills-section">
                <div class="skills-title">Skills & Interests ♡</div>
                <div class="skills-tags" id="skillsContainer">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 社交链接 -->
            <div class="socials-section" id="socialsContainer">
                <!-- 动态生成 -->
            </div>

            <h1 class="hollow-title title-right">SWEET+LIFE</h1>

            <!-- 装饰贴纸 (右页) -->
            <img class="deco" src="https://tc-new.z.wiki/autoupload/1N2_UJVYUo2KjM-_22IFnCfNcKcqEnRmcljopnyJoMs/20260423/Y4je/1475X1247/2026-04-23_135335.png/webp" style="top: -2%; right: -5%; width: 35%; transform: rotate(15deg);">
            <img class="deco" src="https://tc-new.z.wiki/autoupload/1N2_UJVYUo2KjM-_22IFnCfNcKcqEnRmcljopnyJoMs/20260423/atIF/1602X1594/2026-04-23_135445.png/webp" style="top: 5%; right: 5%; width: 18%;">
            <img class="deco deco-top" src="https://tc-new.z.wiki/autoupload/1N2_UJVYUo2KjM-_22IFnCfNcKcqEnRmcljopnyJoMs/20260423/D8yF/1179X1915/2026-04-23_135320.png/webp" style="top: 40%; right: 35%; width: 15%; transform: rotate(12deg); z-index: 30;">
            <img class="deco deco-bg" src="https://tc-new.z.wiki/autoupload/1N2_UJVYUo2KjM-_22IFnCfNcKcqEnRmcljopnyJoMs/20260423/cJL2/1785X1659/2026-04-23_135108.png/webp" style="bottom: -2%; right: 40%; width: 20%;">
            
        </div>
    </div>

    <script src="about-data.js"></script>
    
    <script>
        // 初始化页面数据
        function initAboutPage() {
            // 头像和照片
            document.getElementById('avatarImg').src = aboutData.avatar;
            document.getElementById('avatarCaption').innerText = aboutData.avatarCaption || "That's me! ♡";
            document.getElementById('photo2Img').src = aboutData.photo2 || aboutData.avatar;

            // 基本信息
            document.getElementById('infoName').innerText = aboutData.name;
            document.getElementById('infoTitle').innerText = aboutData.title;
            document.getElementById('infoShortBio').innerText = aboutData.shortBio;

            // 详细介绍
            document.getElementById('bioText').innerText = aboutData.bio;

            // 高光标签
            const highlightsContainer = document.getElementById('highlightsContainer');
            highlightsContainer.innerHTML = '';
            aboutData.highlights.forEach(text => {
                const span = document.createElement('span');
                span.className = 'highlight';
                span.innerText = text;
                highlightsContainer.appendChild(span);
                highlightsContainer.appendChild(document.createElement('br'));
            });

            // 技能标签
            const skillsContainer = document.getElementById('skillsContainer');
            skillsContainer.innerHTML = '';
            aboutData.skills.forEach(skill => {
                const tag = document.createElement('div');
                tag.className = 'skill-tag';
                tag.innerText = skill;
                skillsContainer.appendChild(tag);
            });

            // 社交链接
            const socialsContainer = document.getElementById('socialsContainer');
            socialsContainer.innerHTML = '';
            aboutData.socials.forEach(social => {
                const link = document.createElement('a');
                link.className = 'social-stamp';
                link.href = social.url;
                link.target = '_blank';
                link.title = social.platform;
                link.innerText = social.icon;
                socialsContainer.appendChild(link);
            });
        }

        window.onload = initAboutPage;
    </script>

</body>
</html>
